# =============================================================
# LLM-Judge Semantic Uncertainty - Phase B: B1-1 Configuration
# 3-Prompt Comparison + Negativity Bias + Content Effect
# =============================================================

# --- Dataset ---
dataset:
  name: "triviaqa"
  split: "validation"
  subset: "rc"
  seed: 43                       # Phase A(seed=42)와 구분
  min_context_length: 50         # 단어 수 기준
  max_context_length: 2000

# --- Stratified Sampling (spaCy Native NER Tags) ---
sampling:
  max_per_tag: 20                # 태그당 최대 샘플 수
  min_for_stats: 5               # 이 이상이어야 태그별 통계 분석 포함
  # spaCy native NER 18 tags:
  # PERSON, NORP, FAC, ORG, GPE, LOC, PRODUCT, EVENT, WORK_OF_ART,
  # LAW, LANGUAGE, DATE, TIME, PERCENT, MONEY, QUANTITY, ORDINAL, CARDINAL
  # + UNTAGGED (spaCy가 인식하지 못한 정답)

# --- Evidence-Aware Context Selection ---
evidence:
  match_method: "case_insensitive_substring"
  short_alias_threshold: 3       # alias 길이 ≤ 이 값이면 semantic relevance 체크
  context_window: 50             # 짧은 alias 주변 ±N자 확인

# --- Wrong Answer Generation (Phase A와 동일, rule-based) ---
wrong_answers:
  obvious:
    method: "cross_type_swap"
  confusing:
    method: "same_type_swap"
    numeric_perturbation:
      year_offsets: [1, 5, 10]
      number_factors: [0.8, 1.2]

# --- Judge Model ---
judge:
  model: "gpt-4o-mini"
  temperature: 0.0
  seed: 42
  max_tokens: 300
  n_trials: 30
  logprobs: true
  top_logprobs: 5

# --- Prompts (3-Prompt Comparison) ---
prompts:
  active:                        # B1-1에서 사용할 프롬프트 ID 목록
    - "P-Thakur"
    - "P-CLEV"
    - "P-Lee-Standard"
  # 각 프롬프트의 verdict 가짓수 (SE 정규화에 사용)
  verdict_k:
    "P-Thakur": 2
    "P-CLEV": 3
    "P-Lee-Standard": 3

# --- API Settings ---
api:
  requests_per_minute: 500
  max_retries: 5
  retry_base_delay: 1.0
  timeout: 30
  checkpoint_interval: 100

# --- Batch API Settings ---
batch:
  max_enqueued_tokens: 600000
  est_tokens_per_request: 3000
  poll_interval: 30
  cooldown_between_batches: 90

# --- Smoke Test ---
smoke_test:
  max_per_tag: 2                 # 태그당 2개 → 약 30문항
  n_trials: 3

# --- Analysis ---
analysis:
  entropy_base: "natural"
  flip_rate_threshold: 0.0
  output_formats:
    - "csv"
    - "png"
